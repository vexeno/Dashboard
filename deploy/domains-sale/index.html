<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Domains For Sale | Contact @vyoss</title>
  <link rel="icon" type="image/png" href="/logoX.png">
  <link rel="shortcut icon" href="/logoX.png">
  <link rel="apple-touch-icon" href="/logoX.png">
  <meta name="description" content="Premium short and memorable domains for sale. Contact @vyoss on Telegram for fast purchase." />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Premium Domains For Sale" />
  <meta property="og:description" content="Short, memorable domains available for branding, startups, personal projects, and landing pages." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Premium Domains For Sale" />
  <meta name="twitter:description" content="Short, memorable domains for sale. Contact @vyoss on Telegram." />
  <style>
    :root {
      --page-bg: #f7f4ec;
      --text: #222222;
      --muted: #6f6a5e;
      --card-bg: rgba(255, 255, 255, 0.7);
      --panel-bg: rgba(255, 255, 255, 0.76);
      --button-bg: rgba(255, 255, 255, 0.68);
      --tag-bg: rgba(255, 255, 255, 0.62);
      --border: rgba(37, 34, 28, 0.12);
      --accent: #facc15;
      --accent-strong: #eab308;
      --accent-soft: rgba(250, 204, 21, 0.16);
      --radius: 22px;
      --pill-radius: 999px;
      --shadow: 0 16px 50px rgba(37, 34, 28, 0.12);
      --soft-shadow: 0 12px 34px rgba(37, 34, 28, 0.09);
      --background-image: url('/puzzle-light.svg');
      --page-overlay-a: rgba(255, 250, 235, 0.76);
      --page-overlay-b: rgba(239, 234, 219, 0.76);
      color-scheme: light;
    }

    body.dark-mode {
      --page-bg: #151515;
      --text: #f4f1ea;
      --muted: #b9b1a3;
      --card-bg: rgba(32, 32, 32, 0.68);
      --panel-bg: rgba(27, 27, 27, 0.76);
      --button-bg: rgba(255, 255, 255, 0.06);
      --tag-bg: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.12);
      --accent: #facc15;
      --accent-strong: #fde047;
      --accent-soft: rgba(250, 204, 21, 0.12);
      --shadow: 0 16px 50px rgba(0, 0, 0, 0.34);
      --soft-shadow: 0 12px 34px rgba(0, 0, 0, 0.26);
      --background-image: url('/puzzle-dark.svg');
      --page-overlay-a: rgba(20, 20, 20, 0.78);
      --page-overlay-b: rgba(28, 27, 24, 0.78);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, var(--page-overlay-a), var(--page-overlay-b)),
        var(--background-image) center/340px repeat,
        var(--page-bg);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      display: none;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 48px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .hero {
      position: relative;
      overflow: visible;
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 38px;
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      isolation: isolate;
    }

    .hero::before {
      display: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin: 0 0 18px;
      padding: 8px 14px;
      border: 1px solid rgba(250, 204, 21, 0.55);
      border-radius: var(--pill-radius);
      color: #6b4d00;
      background: rgba(250, 204, 21, 0.16);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(42px, 8vw, 84px);
      line-height: 1.05;
      letter-spacing: -0.055em;
      font-weight: 900;
    }

    h1 span {
      color: var(--text);
    }

    .subtitle {
      max-width: 760px;
      margin: 20px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: var(--pill-radius);
      background: var(--button-bg);
      color: var(--text);
      font-weight: 800;
      box-shadow: var(--soft-shadow);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .button.primary {
      border-color: rgba(250, 204, 21, 0.72);
      background: var(--accent);
      color: #1d1d1d;
    }

    .button svg {
      width: 20px;
      height: 20px;
      margin-right: 8px;
    }

    .button:hover {
      transform: translateY(-3px);
      border-color: rgba(250, 204, 21, 0.72);
      box-shadow: 0 16px 34px rgba(93, 71, 23, 0.16);
    }

    .domains-panel {
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 18px;
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      padding: 8px 10px 18px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1;
      letter-spacing: -0.045em;
    }

    .panel-head p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .domain-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .domain-card {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      min-height: 132px;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card-bg);
      box-shadow: 0 12px 28px rgba(93, 71, 23, 0.1);
      transition: transform 0.32s ease, box-shadow 0.32s ease, border-color 0.32s ease, background 0.32s ease;
    }

    .domain-card::before,
    .domain-card::after {
      display: none;
    }

    .domain-card:hover {
      transform: translateY(-5px);
      border-color: rgba(37, 34, 28, 0.18);
      background: color-mix(in srgb, var(--card-bg) 88%, var(--text) 3%);
      box-shadow: 0 18px 38px rgba(37, 34, 28, 0.12);
    }

    .domain-name {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(23px, 3vw, 34px);
      letter-spacing: -0.045em;
      font-weight: 900;
      word-break: break-word;
    }

    .domain-meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 11px;
      border: 1px solid rgba(37, 34, 28, 0.1);
      border-radius: var(--pill-radius);
      background: var(--tag-bg);
      backdrop-filter: blur(10px);
    }

    .price {
      color: #6b4d00;
      background: rgba(250, 204, 21, 0.22);
      border-color: rgba(250, 204, 21, 0.46);
    }

    body.dark-mode .price {
      color: #f8e18a;
      background: rgba(250, 204, 21, 0.12);
      border-color: rgba(250, 204, 21, 0.24);
    }

    .contact-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      border: 1px solid var(--border);
      border-radius: 34px;
      padding: 22px 24px;
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .contact-card h2 {
      margin: 0;
      font-size: clamp(22px, 4vw, 36px);
      letter-spacing: -0.04em;
    }

    .contact-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      padding: 4px 0 0;
    }

    .top-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-bottom: -6px;
    }

    .theme-toggle {
      display: inline-flex;
      width: 46px;
      height: 46px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--pill-radius);
      color: var(--text);
      background: var(--button-bg);
      box-shadow: var(--soft-shadow);
      cursor: pointer;
      backdrop-filter: blur(16px);
      transition: transform 0.24s ease, background 0.24s ease, border-color 0.24s ease;
    }

    .theme-toggle:hover {
      transform: translateY(-2px);
      border-color: rgba(250, 204, 21, 0.42);
    }

    .theme-toggle svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .theme-toggle .moon-icon {
      display: none;
    }

    body.dark-mode .theme-toggle .sun-icon {
      display: none;
    }

    body.dark-mode .theme-toggle .moon-icon {
      display: block;
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    ::view-transition-old(root) {
      z-index: 0;
    }

    ::view-transition-new(root) {
      z-index: 1;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1120px);
        padding: 22px 0;
      }

      .hero,
      .domains-panel,
      .contact-card {
        border-radius: 26px;
      }

      .hero {
        padding: 28px 22px;
      }

      .domain-grid {
        grid-template-columns: 1fr;
      }

      .panel-head,
      .contact-card {
        align-items: stretch;
        flex-direction: column;
      }

      .button {
        width: 100%;
      }

      .top-actions {
        margin-bottom: -8px;
      }

      .theme-toggle {
        width: 44px;
        height: 44px;
      }
    }
</style>
</head>
<body>
  <div class="page">
    <div class="top-actions">
      <button class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
        <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
    <section class="domains-panel">
      <div class="panel-head">
        <div>
          <h2>Domains For Sale</h2>
        </div>
        <a class="button" href="https://seehex.com" aria-label="Back to SeeHex home">Back Home</a>
      </div>
      <section class="domain-grid" aria-label="Available domains">
        <a class="domain-card" href="https://t.me/vyoss?text=Hi%2C%20I%27m%20interested%20in%20shy.re" target="_blank" rel="noopener noreferrer"><div><h3 class="domain-name">shy.re</h3><div class="domain-meta"><span class="tag">Available</span><span class="tag price">70 CNY</span></div></div></a>
        <a class="domain-card" href="https://t.me/vyoss?text=Hi%2C%20I%27m%20interested%20in%20qaq.re" target="_blank" rel="noopener noreferrer"><div><h3 class="domain-name">qaq.re</h3><div class="domain-meta"><span class="tag">Available</span><span class="tag price">70 CNY</span></div></div></a>
        <a class="domain-card" href="https://t.me/vyoss?text=Hi%2C%20I%27m%20interested%20in%20nocpp.com" target="_blank" rel="noopener noreferrer"><div><h3 class="domain-name">nocpp.com</h3><div class="domain-meta"><span class="tag">Available</span><span class="tag price">50 CNY</span></div></div></a>
        <a class="domain-card" href="https://t.me/vyoss?text=Hi%2C%20I%27m%20interested%20in%20seeblur.com" target="_blank" rel="noopener noreferrer"><div><h3 class="domain-name">seeblur.com</h3><div class="domain-meta"><span class="tag">Available</span><span class="tag price">70 CNY</span></div></div></a>
        <a class="domain-card" href="https://t.me/vyoss?text=Hi%2C%20I%27m%20interested%20in%201ife.me" target="_blank" rel="noopener noreferrer"><div><h3 class="domain-name">1ife.me</h3><div class="domain-meta"><span class="tag">Available</span><span class="tag price">50 CNY</span></div></div></a>
      </section>
    </section>

      <section class="contact-card">
        <div><h2>Contact me directly on Telegram</h2></div>
        <a class="button primary" href="https://t.me/vyoss" target="_blank" rel="noopener noreferrer">
          Telegram: @vyoss
        </a>
      </section>
    <footer>© SeeHex Domains</footer>
  </div>

  <script>
    const themeButton = document.querySelector('.theme-toggle');
    const savedTheme = localStorage.getItem('domains-theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.body.classList.add('dark-mode');
    }

    async function toggleTheme(event) {
      const applyTheme = () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('domains-theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
      };

      if (!document.startViewTransition) {
        applyTheme();
        return;
      }

      const x = event?.clientX ?? window.innerWidth / 2;
      const y = event?.clientY ?? window.innerHeight / 2;
      const endRadius = Math.hypot(
        Math.max(x, window.innerWidth - x),
        Math.max(y, window.innerHeight - y),
      );

      const transition = document.startViewTransition(applyTheme);
      await transition.ready;

      document.documentElement.animate(
        {
          clipPath: [
            'circle(0px at ' + x + 'px ' + y + 'px)',
            'circle(' + endRadius + 'px at ' + x + 'px ' + y + 'px)',
          ],
        },
        {
          duration: 650,
          easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
          pseudoElement: '::view-transition-new(root)',
        },
      );
    }

    themeButton?.addEventListener('click', toggleTheme);
  </script>
</body>
</html>
